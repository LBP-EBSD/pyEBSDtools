experiment_name: "stage3_pair"
seed: 42

training:
  epochs: 50
  batch_size: 8       # 18 patterns per sample (2 × 9) → ~8× memory vs Stage 1
  lr: 5.0e-4
  val_split: 0.15
  test_split: 0.05
  norm_method: "minmax"
  num_workers: 4
  loss_fn: "huber"
  huber_delta: 0.5

model:
  # Encoder output size — shared across all 18 patterns (9 per grid × 2 grids).
  # The relative feature map F_B − F_A has shape (B, feature_dim, 3, 3).
  feature_dim: 128

data:
  path: "data/"
  patterns_file: "X_patterns.npy"
  strain_file: "y_strain.npy"

  # Scan grid dimensions — must satisfy grid_rows * grid_cols == N patterns.
  grid_rows: 100
  grid_cols: 100

  # Which adjacency directions to use when building pairs.
  # 'horizontal': A=(r,c) → B=(r,c+1)
  # 'vertical':   A=(r,c) → B=(r+1,c)
  # Both directions provide all information needed for 2D strain field reconstruction.
  directions:
    - horizontal
    - vertical
